name: Validate Agent Skill

on:
  push:
    branches: [main]
    paths:
      - "**/SKILL.md"
      - "**/references/**"
      - "references/**"
      - "commands/**"
      - "evals/**"
      - "scripts/**"
      - ".github/workflows/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".claude-plugin/**"
      - "docs/**"
      - "hooks/**"
      - "memory/**"
      - ".gitignore"
      - "README.md"
      - "CLAUDE.md"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
      - "CONNECTORS.md"
      - "VERSIONS.md"
      - "marketplace.json"
      - ".mcp.json"
  pull_request:
    branches: [main]
    paths:
      - "**/SKILL.md"
      - "**/references/**"
      - "references/**"
      - "commands/**"
      - "evals/**"
      - "scripts/**"
      - ".github/workflows/**"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE.md"
      - ".claude-plugin/**"
      - "docs/**"
      - "hooks/**"
      - "memory/**"
      - ".gitignore"
      - "README.md"
      - "CLAUDE.md"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
      - "CONNECTORS.md"
      - "VERSIONS.md"
      - "marketplace.json"
      - ".mcp.json"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate all skills
        run: |
          set -euo pipefail
          find research build optimize monitor cross-cutting \
            -mindepth 2 -maxdepth 2 -name SKILL.md \
            -print | sort | while read -r file; do
            bash scripts/validate-skill.sh "$(dirname "$file")"
          done
          bash scripts/validate-skill.sh --status
